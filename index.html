<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pantry Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📦 Pantry Manager</h1>

<div class="tabs">
  <button onclick="showTab('inventory')">Inventory</button>
  <button onclick="showTab('qr')">QR Tools</button>
</div>

<!-- INVENTORY TAB -->
<div id="inventory" class="tab active">
  <h2>📊 Inventory</h2>

  <button onclick="addRow()">➕ Add Item</button>

  <table id="inventoryTable">
    <thead>
      <tr>
        <th>Item</th>
        <th>Quantity</th>
        <th>Location</th>
        <th>Delete</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- QR TAB -->
<div id="qr" class="tab">
  <h2>🔗 QR Code</h2>
  <canvas id="qrcode"></canvas>

  <h3>📷 Scan</h3>
  <div id="reader"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script src="script.js"></script>
</body>
</html>
